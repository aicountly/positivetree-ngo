name: Deploy to cPanel via rsync (Production)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: sqlite3, pdo_sqlite
          tools: composer

      - name: Install and build site
        run: |
          npm run build:marketing
          npm run copy:api
          npm ci --prefix app
          npm run build --prefix app

      # CPANEL_SSH_PRIVATE_KEY must be unencrypted (no passphrase).
      # On cPanel/Linux: ssh-keygen -t ed25519 -C "github-actions-positivetree" -f deploy_key -N ""
      # Do NOT use -N '""' on Linux — that sets a passphrase, not an empty one.
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null; then
            echo "::error::SSH key is invalid or passphrase-protected. Regenerate on the server with: ssh-keygen -t ed25519 -C github-actions-positivetree -f deploy_key -N \"\""
            exit 1
          fi
          ssh-keyscan -H "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        env:
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          REMOTE_DIR: ${{ secrets.CPANEL_SSH_REMOTE_DIR }}
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./public_html/ \
            "${SSH_USER}@${SSH_HOST}:${REMOTE_DIR}"
