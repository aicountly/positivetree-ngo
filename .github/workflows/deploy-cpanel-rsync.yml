name: Deploy to cPanel via rsync (Production)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Add SSH host key
        run: ssh-keyscan -H "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        env:
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          REMOTE_DIR: ${{ secrets.CPANEL_SSH_REMOTE_DIR }}
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            ./public/ \
            "${SSH_USER}@${SSH_HOST}:${REMOTE_DIR}"
